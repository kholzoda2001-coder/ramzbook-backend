<style>

  :root[data-theme='light'] { --bg:#f7f5f1; --card:#ffffff; --ink:#1b211f; --sub:#62716b; --accent:#0e9c8c; --accent-soft:rgba(14,156,140,.10); --border:rgba(27,33,31,.10); --thumb-bg:#eef2f0; color-scheme:light; }
