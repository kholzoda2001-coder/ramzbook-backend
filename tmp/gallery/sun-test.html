<style>
  :root { --bg:#f7f5f1; --card:#fff; --ink:#1b211f; --sub:#62716b; --accent:#0e9c8c; --border:rgba(27,33,31,.10); --thumb:#eef2f0; }
  @media (prefers-color-scheme: dark) { :root { --bg:#101613; --card:#172420; --ink:#eaf3ef; --sub:#93a6a0; --accent:#34e0c6; --border:rgba(234,243,239,.12); --thumb:#1d2b26; } }
  :root[data-theme='dark'] { --bg:#101613; --card:#172420; --ink:#eaf3ef; --sub:#93a6a0; --accent:#34e0c6; --border:rgba(234,243,239,.12); --thumb:#1d2b26; }
  :root[data-theme='light'] { --bg:#f7f5f1; --card:#fff; --ink:#1b211f; --sub:#62716b; --accent:#0e9c8c; --border:rgba(27,33,31,.10); --thumb:#eef2f0; }
  * { box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; }
  .wrap { max-width:720px; margin:0 auto; padding:40px 24px; }
  .eyebrow { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin:0 0 8px; }
  h1 { font-size:26px; font-weight:800; margin:0 0 12px; text-wrap:balance; }
  .sub { font-size:14px; line-height:1.6; color:var(--sub); max-width:560px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:18px; margin-top:28px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin:0; }
  .thumb { aspect-ratio:1/1; background:var(--thumb); display:flex; align-items:center; justify-content:center; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  figcaption { padding:12px 14px; font-size:13px; font-weight:600; color:var(--sub); }
</style>
